Connection Settings:
  # Supported: MARIADB, MYSQL, H2
  # Default: H2
  Type: H2
  # Hostname for remote databases
  Hostname: localhost
  # Port for remote databases
  Port: 3306
  # Username for remote databases
  Username: username
  # Password for remote databases
  Password: password
  # Database name for remote databases
  Database: database
  # Maximum number of connections to the database
  Pool Size: 5
  # Use SSL for remote databases
  Use SSL: false
  # Table prefix for database tables
  # Useful when running multiple servers sharing the same database
  # Example: 'survival_' creates tables like 'survival_placed_hoppers' instead of 'placed_hoppers'
  # Leave empty for no prefix (default)
  Table Prefix: ''
